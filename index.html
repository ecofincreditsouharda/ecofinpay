<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcofinPay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0ea5e9">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .splash { animation: fadeOut 2.8s forwards; }
    @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
    .logo-img { max-height: 130px; object-fit: contain; }
  </style>
</head>
<body class="bg-[#c9e8ff] min-h-screen">
  <!-- Splash Screen -->
  <div id="splash" class="splash fixed inset-0 bg-[#c9e8ff] flex flex-col items-center justify-center z-50">
    <img src="assets/Ecofin New Small trans.png" alt="EcofinPay Logo" class="logo-img mb-6" onerror="this.outerHTML='<div class=\'text-7xl mb-4\'>🌱</div>'">
    <h1 class="text-4xl font-bold mb-1 tracking-tight text-emerald-800">EcofinPay</h1>
    <p class="text-xl tracking-widest text-emerald-700">Empowering Aspirations Faster</p>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden min-h-screen bg-[#c9e8ff]">
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
      <div class="max-w-md w-full">
        <div class="text-center mb-8">
          <img src="assets/Ecofin New Small trans.png" alt="EcofinPay Logo" 
               class="mx-auto h-24 mb-4" 
               onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='block';">
          <div id="fallback-logo" class="hidden text-6xl mb-4">🌱</div>
          <h1 class="text-4xl font-bold text-emerald-800 tracking-tight">ECOFINPAY</h1>
          <p class="text-emerald-700 mt-1 text-lg">Empowering Aspirations Faster</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8">
          <form id="login-form" class="space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">User ID</label>
              <input type="text" id="userId" required
                     class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-500 focus:ring-1">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input type="password" id="password" required
                     class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-500 focus:ring-1">
            </div>
            <button type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
              Sign In
            </button>
          </form>
        </div>

        <p class="text-center text-xs text-gray-600 mt-8">Powered by Arambh</p>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden min-h-screen bg-[#c9e8ff]">
      <header class="bg-white shadow-sm border-b sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <img src="assets/Ecofin New Small trans.png" alt="Logo" class="h-10" onerror="this.outerHTML='<span class=\'text-3xl\'>🌱</span>'">
            <div>
              <h1 class="font-bold text-2xl text-emerald-800">EcofinPay</h1>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="text-right">
              <p id="user-name" class="font-semibold text-gray-800"></p>
              <p id="user-role" class="text-sm text-emerald-600"></p>
            </div>
            <button onclick="logout()" 
                    class="px-6 py-2.5 text-sm bg-red-50 hover:bg-red-100 text-red-700 rounded-2xl font-medium transition">
              Logout
            </button>
          </div>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-6 py-10">
        <div id="role-content" class="bg-white rounded-3xl shadow p-10 min-h-[60vh]"></div>
      </main>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyBLhy3N9oa6HPmXNNe_416UasZk09yhzPr5iorTdZ_GsByWntHiwYf6FM_TCwURAcQnA/exec';

    let currentUser = null;

    function showScreen(screen) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById(screen).classList.remove('hidden');
    }

    async function login(userId, password) {
      try {
        const res = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, password })
        });
        const data = await res.json();

        if (data.success) {
          currentUser = data;
          localStorage.setItem('ecofinUser', JSON.stringify(data));
          loadDashboard();
        } else {
          alert(data.message || 'Invalid User ID or Password');
        }
      } catch (err) {
        console.error(err);
        alert('Cannot connect to server. Please check internet or try again later.');
      }
    }

    function loadDashboard() {
      const user = currentUser;
      document.getElementById('user-name').textContent = user.name || 'User';
      document.getElementById('user-role').textContent = (user.role || 'Collector') + " Portal";

      let html = `<div class="text-center mb-8"><h2 class="text-3xl font-bold text-emerald-800">Welcome, ${user.name || 'User'}!</h2></div>`;

      if (user.role === 'Admin') {
        html += `<p class="text-xl text-center">Full System Access</p>`;
      } else if (user.role === 'Manager') {
        html += `<p class="text-xl text-center">Manager Access - Collectors Management</p>`;
      } else {
        html += `<p class="text-xl text-center">Collector Portal</p>`;
      }

      document.getElementById('role-content').innerHTML = html;
      showScreen('dashboard');
    }

    function logout() {
      localStorage.removeItem('ecofinUser');
      currentUser = null;
      showScreen('login-screen');
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value;
      if (userId && password) login(userId, password);
    });

    window.onload = () => {
      setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app').classList.remove('hidden');

        const savedUser = localStorage.getItem('ecofinUser');
        if (savedUser) {
          currentUser = JSON.parse(savedUser);
          loadDashboard();
        } else {
          showScreen('login-screen');
        }
      }, 2500);
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
