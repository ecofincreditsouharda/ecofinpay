            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">User ID</label>
              <input type="text" id="userId" required

            </div>
            <button type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
              Sign In
            </button>
          </form>
        </div>

        <p class="text-center text-xs text-gray-500 mt-8">Secure Login • Demo Version</p>
      </div>
    </div>

            </div>
          </div>
          <div class="flex items-center gap-4">

            </div>
            <button onclick="logout()" 
                    class="px-6 py-2.5 text-sm bg-red-50 hover:bg-red-100 text-red-700 rounded-2xl font-medium transition">
              Logout
            </button>
          </div>
        </div>
      </header>

      <main class="max-w-6xl mx-auto px-6 py-10">
        <div id="role-content" class="bg-white rounded-3xl shadow p-10 min-h-[60vh]"></div>
      </main>
    </div>
  </div>
